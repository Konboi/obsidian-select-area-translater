name: release-assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build plugin
        run: npm run build
      - name: Validate release version
        run: node version-bump.mjs --check-tag=${{ github.event.release.tag_name }}
      - name: Create release archive
        run: |
          mkdir -p release
          cp manifest.json main.js styles.css release/
          cd release
          zip "${{ github.event.repository.name }}-${{ github.event.release.tag_name }}.zip" manifest.json main.js styles.css
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/manifest.json
            release/main.js
            release/styles.css
            release/${{ github.event.repository.name }}-${{ github.event.release.tag_name }}.zip
